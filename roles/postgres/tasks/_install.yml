---
- name: Install PostgreSQL server, contrib, and libs packages
  ansible.builtin.dnf:
    name:
      - "{{ postgres_pkg_server }}"
      - "{{ postgres_pkg_contrib }}"
      - "{{ postgres_pkg_libs }}"
    state: present

- name: Install support packages for SELinux management
  ansible.builtin.dnf:
    name: "{{ postgres_support_packages }}"
    state: present

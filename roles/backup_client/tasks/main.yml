---
- name: Validate preconditions
  ansible.builtin.import_tasks: _assert.yml
  tags: [backup, assert]

- name: Install pgBackRest
  ansible.builtin.import_tasks: _install.yml
  tags: [backup, install]

- name: Generate the dedicated SSH keypair
  ansible.builtin.import_tasks: _ssh.yml
  tags: [backup, ssh, config]

- name: Render client-side pgBackRest configuration
  tags: [backup, config]
  block:
    - name: Render the client-side pgBackRest config
      ansible.builtin.template:
        src: pgbackrest.conf.j2
        dest: "{{ backup_client_config_file }}"
        owner: root
        group: "{{ backup_client_pg_user }}"
        mode: "0640"

- name: Configure PostgreSQL WAL archiving via Patroni
  tags: [backup, service]
  block:
    # WAL archiving is a PostgreSQL parameter, and Patroni owns PostgreSQL
    # parameters. We PATCH Patroni's dynamic config once (on any node; the
    # DCS broadcasts it cluster-wide). archive_mode requires a restart the
    # first time it flips from off to on; Patroni schedules that itself and
    # reports `pending_restart`. On already-archiving clusters this is a
    # no-op PATCH.

    - name: Read the current Patroni dynamic config
      ansible.builtin.uri:
        url: "https://{{ patroni_advertise_address | default(ansible_host) }}:{{ patroni_rest_port | default(8008) }}/config"
        method: GET
        validate_certs: false
        client_cert: "{{ patroni_cert_file | default(omit) }}"
        client_key: "{{ patroni_key_file | default(omit) }}"
        return_content: true
      register: backup_client_patroni_config
      run_once: true

    - name: Patch Patroni with the pgBackRest archive_command
      ansible.builtin.uri:
        url: "https://{{ patroni_advertise_address | default(ansible_host) }}:{{ patroni_rest_port | default(8008) }}/config"
        method: PATCH
        validate_certs: false
        client_cert: "{{ patroni_cert_file | default(omit) }}"
        client_key: "{{ patroni_key_file | default(omit) }}"
        body_format: json
        body:
          postgresql:
            parameters:
              archive_mode: "on"
              archive_command: >-
                pgbackrest --stanza={{ backup_client_stanza }} archive-push %p
              archive_timeout: 60
        status_code: [200]
      register: backup_client_archive_patch
      run_once: true
      when: >-
        (backup_client_patroni_config.json.postgresql.parameters.archive_command
          | default('')) !=
        ('pgbackrest --stanza=' ~ backup_client_stanza ~ ' archive-push %p')

    - name: Report whether a restart is pending for archive_mode  # noqa: no-handler
      ansible.builtin.debug:
        msg: >-
          Patroni archive_command set. If archive_mode flipped on for the
          first time, Patroni will report pending_restart; run
          `patronictl restart {{ cluster_name }} --pending` during a
          maintenance window.
      run_once: true
      when: backup_client_archive_patch.changed | default(false)

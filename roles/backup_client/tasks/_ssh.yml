---
# Generate a dedicated keypair owned by the postgres OS user. The public
# half is exported as a fact so the backup_store role can authorize it.

- name: Ensure the postgres user's .ssh directory exists
  ansible.builtin.file:
    path: "{{ backup_client_ssh_dir }}"
    state: directory
    owner: "{{ backup_client_pg_user }}"
    group: "{{ backup_client_pg_user }}"
    mode: "0700"

- name: Generate the dedicated pgBackRest SSH keypair
  community.crypto.openssh_keypair:
    path: "{{ backup_client_ssh_key_path }}"
    type: "{{ backup_client_ssh_key_type }}"
    owner: "{{ backup_client_pg_user }}"
    group: "{{ backup_client_pg_user }}"
    mode: "0600"
    comment: "pgbackrest@{{ inventory_hostname }}"
    regenerate: never
  register: backup_client_keypair

- name: Read the generated public key
  ansible.builtin.slurp:
    src: "{{ backup_client_ssh_key_path }}.pub"
  register: backup_client_pubkey_slurp

- name: Export the public key as a host fact
  ansible.builtin.set_fact:
    backup_client_ssh_pubkey: "{{ backup_client_pubkey_slurp.content | b64decode | trim }}"

- name: Scan the backup_store host key into known_hosts
  ansible.builtin.known_hosts:
    path: "{{ backup_client_ssh_dir }}/known_hosts"
    name: "{{ hostvars[backup_client_repo_host].ansible_host }}"
    key: >-
      {{ lookup('pipe',
         'ssh-keyscan -p ' ~ backup_client_ssh_port ~ ' -t ed25519 '
         ~ hostvars[backup_client_repo_host].ansible_host) }}
    state: present
  become: true
  become_user: "{{ backup_client_pg_user }}"

---
- name: Render the pigsty-lite reverse-proxy config
  ansible.builtin.template:
    src: pigsty-lite.conf.j2
    dest: "{{ nginx_proxy_config_file }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Validate nginx configuration
  ansible.builtin.command:
    cmd: nginx -t
  changed_when: false

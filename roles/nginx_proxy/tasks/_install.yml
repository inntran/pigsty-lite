---
- name: Install nginx
  ansible.builtin.dnf:
    name: "{{ nginx_proxy_package }}"
    state: present

- name: Allow nginx to connect to loopback upstreams
  ansible.posix.seboolean:
    name: httpd_can_network_connect
    state: true
    persistent: true
  when: ansible_facts.selinux.status == "enabled"

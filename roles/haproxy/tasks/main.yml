---
- name: Fail if postgres group is empty
  ansible.builtin.assert:
    that:
      - groups['postgres'] | length > 0
    fail_msg: "HAProxy requires at least one host in the 'postgres' group."
  run_once: true
  delegate_to: localhost
  tags: [haproxy, assert]

- name: Stat patroni-rest firewalld service (P2a should have installed it)
  ansible.builtin.stat:
    path: /etc/firewalld/services/patroni-rest.xml
  register: haproxy_patroni_svc_stat
  tags: [haproxy, assert]

- name: Warn if patroni-rest firewalld service missing
  ansible.builtin.debug:
    msg: >-
      patroni-rest firewalld service not present at
      /etc/firewalld/services/patroni-rest.xml. HAProxy will still work
      (it talks to Patroni REST locally over loopback), but the cross-host
      health checks won't traverse firewalld until P2a's patroni role runs.
  when: not haproxy_patroni_svc_stat.stat.exists
  tags: [haproxy, assert]

- name: Install HAProxy
  ansible.builtin.dnf:
    name: "{{ haproxy_package }}"
    state: present
  tags: [haproxy, install]

- name: Allow HAProxy to connect to arbitrary TCP ports (Patroni REST 8008 on peers)
  ansible.posix.seboolean:
    name: haproxy_connect_any
    state: true
    persistent: true
  when: ansible_facts.selinux.status == "enabled"
  tags: [haproxy, install, selinux]

- name: Render sysctl file for vip-manager HAProxy binds
  ansible.builtin.template:
    src: haproxy-vip-sysctl.conf.j2
    dest: /etc/sysctl.d/90-pigsty-lite-haproxy-vip.conf
    owner: root
    group: root
    mode: "0644"
  register: haproxy_vip_sysctl_file
  when: vip_manager_enabled | default(false) | bool
  tags: [haproxy, install, sysctl]

- name: Apply sysctl file for vip-manager HAProxy binds
  ansible.builtin.command:
    cmd: sysctl --system
  changed_when: haproxy_vip_sysctl_file.changed
  when:
    - vip_manager_enabled | default(false) | bool
    - haproxy_vip_sysctl_file.changed
  tags: [haproxy, install, sysctl]

- name: Render haproxy.cfg
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: "{{ haproxy_config_file }}"
    owner: root
    group: root
    mode: "0640"
    validate: "haproxy -c -f %s"
  notify: Reload haproxy
  tags: [haproxy, config]

- name: Install haproxy-postgres firewalld service definition
  ansible.builtin.copy:
    src: "firewalld/services/haproxy-postgres.xml"
    dest: /etc/firewalld/services/haproxy-postgres.xml
    owner: root
    group: root
    mode: "0644"
  notify: Reload firewalld
  tags: [haproxy, firewall]

- name: Flush handlers so firewalld reloads before service rules are applied
  ansible.builtin.meta: flush_handlers
  tags: [haproxy, firewall]

- name: Open built-in postgresql service (5432)
  ansible.posix.firewalld:
    service: postgresql
    permanent: true
    state: enabled
    immediate: true
    zone: "{{ haproxy_firewalld_zone }}"
  tags: [haproxy, firewall]

- name: Open custom haproxy-postgres service (5433, 5434)
  ansible.posix.firewalld:
    service: haproxy-postgres
    permanent: true
    state: enabled
    immediate: true
    zone: "{{ haproxy_firewalld_zone }}"
  tags: [haproxy, firewall]

- name: Enable and start haproxy
  ansible.builtin.systemd:
    name: "{{ haproxy_service_name }}"
    enabled: true
    state: started
  tags: [haproxy, service]

- name: Wait for HAProxy frontends to listen
  ansible.builtin.command:
    cmd: "ss -H -ltn sport = :{{ item }}"
  register: haproxy_listener_probe
  changed_when: false
  retries: 30
  delay: 1
  until: haproxy_listener_probe.stdout | length > 0
  loop:
    - "{{ haproxy_default_port }}"
    - "{{ haproxy_primary_port }}"
    - "{{ haproxy_replica_port }}"
  tags: [haproxy, service]

- name: Wait for HAProxy stats listener
  ansible.builtin.wait_for:
    host: "{{ haproxy_stats_listen_address }}"
    port: "{{ haproxy_stats_port }}"
    timeout: 30
  tags: [haproxy, service]

---
- name: Fail if etcd group is empty
  ansible.builtin.assert:
    that:
      - groups['etcd'] | length > 0
    fail_msg: "Inventory group 'etcd' is empty; P1 requires at least one host."
  run_once: true
  delegate_to: localhost

- name: Fail unless etcd group size is 1 or 3
  ansible.builtin.assert:
    that:
      - groups['etcd'] | length in [1, 3]
    fail_msg: >-
      etcd group size must be 1 (single profile) or 3 (ha profile);
      got {{ groups['etcd'] | length }}.
  run_once: true
  delegate_to: localhost

- name: Verify host cert exists (from P0 certs role)
  ansible.builtin.stat:
    path: "{{ etcd_cert_file }}"
  register: etcd_cert_stat

- name: Fail if host cert missing
  ansible.builtin.assert:
    that:
      - etcd_cert_stat.stat.exists
    fail_msg: >-
      Expected per-host certificate at {{ etcd_cert_file }};
      run the P0 _node.yml playbook (certs role) first.

- name: Verify host private key exists (from P0 certs role)
  ansible.builtin.stat:
    path: "{{ etcd_key_file }}"
  register: etcd_key_stat

- name: Fail if host private key missing
  ansible.builtin.assert:
    that:
      - etcd_key_stat.stat.exists
    fail_msg: >-
      Expected per-host private key at {{ etcd_key_file }};
      run the P0 _node.yml playbook (certs role) first.

---
- name: Validate preconditions
  ansible.builtin.import_tasks: _assert.yml
  tags: [etcd, assert]

- name: Install etcd package and prepare filesystem
  ansible.builtin.import_tasks: _install.yml
  tags: [etcd, install]

- name: Render etcd configuration
  ansible.builtin.import_tasks: _configure.yml
  tags: [etcd, config]

- name: Open firewalld services
  ansible.builtin.import_tasks: _firewall.yml
  tags: [etcd, firewall]

- name: Apply pending etcd configuration changes before health gate
  ansible.builtin.meta: flush_handlers
  tags: [etcd, service]

- name: Enable and start etcd
  ansible.builtin.systemd:
    name: "{{ etcd_service_name }}"
    enabled: true
    state: started
  tags: [etcd, service]

- name: Wait for etcd to report healthy
  ansible.builtin.command:
    cmd: >-
      etcdctl
      --endpoints=https://{{ etcd_advertise_url_host }}:{{ etcd_client_port }}
      --cacert={{ etcd_trusted_ca_file }}
      --cert={{ etcd_cert_file }}
      --key={{ etcd_key_file }}
      endpoint health
  register: etcd_health
  changed_when: false
  retries: "{{ etcd_health_retries }}"
  delay: "{{ etcd_health_delay }}"
  until: "'is healthy' in etcd_health.stdout"
  tags: [etcd, service]

---
- name: Assert pgbackrest_mode is set to a valid value
  ansible.builtin.assert:
    that:
      - pgbackrest_mode is defined
      - pgbackrest_mode in ['server', 'client']
    fail_msg: >-
      pgbackrest_mode must be set to 'server' or 'client' at role
      invocation. Got: {{ pgbackrest_mode | default('<unset>') }}
  tags: [pgbackrest, always]

- name: Install pgBackRest
  ansible.builtin.import_tasks: _install.yml
  tags: [pgbackrest, install]

- name: Render pgBackRest configuration
  ansible.builtin.import_tasks: _config.yml
  tags: [pgbackrest, config]

- name: Deploy and start pgBackRest TLS server daemon
  ansible.builtin.import_tasks: _service.yml
  when: pgbackrest_mode in ['server', 'client']
  tags: [pgbackrest, service]

- name: Open firewalld for pgBackRest TLS port
  ansible.builtin.import_tasks: _firewall.yml
  when: pgbackrest_mode == 'server'
  tags: [pgbackrest, firewall]

- name: Create pgBackRest stanza
  ansible.builtin.import_tasks: _stanza.yml
  when: pgbackrest_mode == 'server'
  tags: [pgbackrest, stanza]

# Note: WAL archive activation (_archive.yml) is NOT imported here.
# It runs as a separate third play in playbooks/_pgbackrest.yml, on
# hosts: postgres, so the play sees patroni's role defaults natively
# rather than via delegation from the backup_server host.

- name: Install backup timers
  ansible.builtin.import_tasks: _timers.yml
  when: pgbackrest_mode == 'server'
  tags: [pgbackrest, timers]

# Note: the initial backup runs in playbooks/_pgbackrest.yml's third play,
# AFTER archive activation. Putting it here (server play, before
# archive_command is live) would fail with "archive_command must contain
# pgbackrest" because backup needs WAL archiving operational.

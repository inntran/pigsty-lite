---
# This task file runs on the postgres group directly (no delegation),
# from the third play of playbooks/_pgbackrest.yml. Patroni's role
# defaults are loaded into the play before this runs, so the patroni
# template can be re-rendered in this play's variable scope.

- name: Inject archive_mode and archive_command into postgres_extra_parameters  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    postgres_extra_parameters: >-
      {{
        (postgres_extra_parameters | default({})) | combine({
          'archive_mode': 'on',
          'archive_command': "pgbackrest --stanza=" ~ pgbackrest_stanza ~ " archive-push %p"
        })
      }}

- name: Re-render patroni.yml with archive settings
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../roles/patroni/templates/patroni.yml.j2"
    dest: "{{ patroni_config_file | default('/etc/patroni/patroni.yml') }}"
    owner: root
    group: "{{ postgres_group | default('postgres') }}"
    mode: "0640"
  register: _pgbackrest_patroni_config

- name: Reload Patroni to apply archive settings  # noqa: no-handler
  ansible.builtin.systemd:
    name: patroni
    state: reloaded
  when: _pgbackrest_patroni_config.changed
  # Inline (not a handler) because the next task (wait for archive_command)
  # must observe the reload's effect before the play moves on.

- name: Wait for archive_command to be active in PostgreSQL
  ansible.builtin.command:
    cmd: psql -U {{ pgbackrest_user | default('postgres') }} -tAc "SHOW archive_command"
  become: true
  become_user: "{{ pgbackrest_user | default('postgres') }}"
  register: _pgbackrest_archive_cmd
  until: "'pgbackrest' in (_pgbackrest_archive_cmd.stdout | default(''))"
  retries: 12
  delay: 5
  changed_when: false

- name: Check pgBackRest stanza configuration
  ansible.builtin.command:
    cmd: pgbackrest --stanza={{ pgbackrest_stanza }} check
  become: true
  become_user: "{{ pgbackrest_user }}"
  changed_when: false
  register: _pgbackrest_stanza_check
  failed_when: _pgbackrest_stanza_check.rc != 0
  run_once: true

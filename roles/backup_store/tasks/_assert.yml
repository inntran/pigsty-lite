---
- name: Fail if backup_store group is empty
  ansible.builtin.assert:
    that:
      - groups['backup_store'] | length > 0
    fail_msg: "Inventory group 'backup_store' is empty; P4 requires exactly one host."
  run_once: true
  delegate_to: localhost

- name: Fail unless backup_store group size is exactly 1
  ansible.builtin.assert:
    that:
      - groups['backup_store'] | length == 1
    fail_msg: >-
      backup_store group must contain exactly one host;
      got {{ groups['backup_store'] | length }}.
      Multi-host repository HA is out of scope.
  run_once: true
  delegate_to: localhost

- name: Fail if postgres group is empty
  ansible.builtin.assert:
    that:
      - groups['postgres'] | length > 0
    fail_msg: "Inventory group 'postgres' is empty; nothing to back up."
  run_once: true
  delegate_to: localhost

- name: Stat the repository path
  ansible.builtin.stat:
    path: "{{ backup_store_repo_path }}"
  register: backup_store_repo_stat

- name: Warn if repository path is not yet a separate mount
  ansible.builtin.debug:
    msg: >-
      WARNING: {{ backup_store_repo_path }} should be a separate mount
      sized for {{ backup_store_retention_full }} full backups plus WAL.
      Continuing - many valid single-disk dev setups exist.
  when: not backup_store_repo_stat.stat.exists or not backup_store_repo_stat.stat.isdir

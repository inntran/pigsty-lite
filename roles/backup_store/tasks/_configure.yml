---
- name: Render the server-side pgBackRest config
  ansible.builtin.template:
    src: pgbackrest.conf.j2
    dest: "{{ backup_store_config_file }}"
    owner: "{{ backup_store_user }}"
    group: "{{ backup_store_group }}"
    mode: "0640"

- name: Render the secondary_store S3 credentials file when secondary_store is enabled
  ansible.builtin.copy:
    content: |
      [global]
      repo2-s3-key={{ backup_store_secondary.access_key }}
      repo2-s3-key-secret={{ backup_store_secondary.secret_key }}
    dest: "{{ backup_store_config_dir }}/secondary_store-secret.conf"
    owner: "{{ backup_store_user }}"
    group: "{{ backup_store_group }}"
    mode: "0600"
  no_log: true
  when: backup_store_secondary and backup_store_secondary.get('enabled')

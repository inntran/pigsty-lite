---
# Render the templated unit files. pgBackRest's `--type=full|diff` and
# the maintenance verbs (`expire`, `check`) map onto systemd instance
# names via `@`. We render one service template per family and two
# concrete timer files per family (full/diff, expire/check) because a
# .timer's OnCalendar cannot be instance-parameterized.

- name: Render the backup oneshot service template
  ansible.builtin.template:
    src: pgbackrest-backup.service.j2
    dest: "{{ backup_store_systemd_dir }}/pgbackrest-backup@.service"
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd for backup_store

- name: Render the maintenance oneshot service template
  ansible.builtin.template:
    src: pgbackrest-maint.service.j2
    dest: "{{ backup_store_systemd_dir }}/pgbackrest-maint@.service"
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd for backup_store

- name: Render the backup timer files (full, diff)
  ansible.builtin.template:
    src: pgbackrest-backup.timer.j2
    dest: "{{ backup_store_systemd_dir }}/pgbackrest-backup@{{ item }}.timer"
    owner: root
    group: root
    mode: "0644"
  loop:
    - full
    - diff
  vars:
    timer_instance: "{{ item }}"
  notify: Reload systemd for backup_store

- name: Render the maintenance timer files (expire, check)
  ansible.builtin.template:
    src: pgbackrest-maint.timer.j2
    dest: "{{ backup_store_systemd_dir }}/pgbackrest-maint@{{ item }}.timer"
    owner: root
    group: root
    mode: "0644"
  loop:
    - expire
    - check
  vars:
    timer_instance: "{{ item }}"
  notify: Reload systemd for backup_store

- name: Reload systemd before enabling timers
  ansible.builtin.meta: flush_handlers

- name: Enable and start the backup timers
  ansible.builtin.systemd:
    name: "pgbackrest-backup@{{ item }}.timer"
    enabled: true
    state: started
  loop:
    - full
    - diff

- name: Enable and start the maintenance timers
  ansible.builtin.systemd:
    name: "pgbackrest-maint@{{ item }}.timer"
    enabled: true
    state: started
  loop:
    - expire
    - check

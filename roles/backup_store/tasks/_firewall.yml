---
# On a dedicated backup_store host, open SSH to postgres nodes only.
# When backup_store is colocated with monitor, leave SSH baseline policy
# alone because the monitor host is the DBA/operator login host.

- name: Build the postgres-node firewall source list
  ansible.builtin.set_fact:
    backup_store_firewall_sources: >-
      {{ (backup_store_firewall_sources | default([]))
         + [{'address': backup_store_source_address,
             'family': ('ipv6' if ':' in (backup_store_source_address | string) else 'ipv4')}] }}
  loop: "{{ groups['postgres'] }}"
  vars:
    backup_store_source_address: >-
      {{ hostvars[item].ansible_host
         | default(hostvars[item].ansible_facts.default_ipv4.address) }}

- name: Open SSH to postgres nodes on the backup store host
  ansible.posix.firewalld:
    rich_rule: >-
      rule family="{{ item.family }}" source address="{{ item.address }}"
      port port="{{ backup_store_ssh_port }}" protocol="tcp" accept
    permanent: true
    state: enabled
    immediate: true
    zone: "{{ backup_store_firewalld_zone }}"
  loop: "{{ backup_store_firewall_sources | unique }}"
  when: inventory_hostname not in (groups['monitor'] | default([]))

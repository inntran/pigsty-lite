---
- name: Validate preconditions
  ansible.builtin.import_tasks: _assert.yml
  tags: [backup, assert]

- name: Install pgBackRest and prepare the backup store
  ansible.builtin.import_tasks: _install.yml
  tags: [backup, install]

- name: Accept SSH keys from postgres nodes
  ansible.builtin.import_tasks: _ssh.yml
  tags: [backup, ssh]

- name: Render server-side pgBackRest configuration
  tags: [backup, config]
  block:
    - name: Render the server-side pgBackRest config
      ansible.builtin.template:
        src: pgbackrest.conf.j2
        dest: "{{ backup_store_config_file }}"
        owner: "{{ backup_store_user }}"
        group: "{{ backup_store_group }}"
        mode: "0640"

    - name: Render the secondary_store S3 credentials file when secondary_store is enabled
      ansible.builtin.copy:
        content: |
          [global]
          repo2-s3-key={{ backup_store_secondary.access_key }}
          repo2-s3-key-secret={{ backup_store_secondary.secret_key }}
        dest: "{{ backup_store_config_dir }}/secondary_store-secret.conf"
        owner: "{{ backup_store_user }}"
        group: "{{ backup_store_group }}"
        mode: "0600"
      no_log: true
      when: backup_store_secondary and backup_store_secondary.get('enabled')

- name: Open firewalld for SSH from postgres nodes
  tags: [backup, firewall]
  block:
    # On a dedicated backup_store host, open SSH to postgres nodes only.
    # When backup_store is colocated with monitor, leave SSH baseline policy
    # alone because the monitor host is the DBA/operator login host.

    - name: Build the postgres-node firewall source list
      ansible.builtin.set_fact:
        backup_store_firewall_sources: >-
          {{ (backup_store_firewall_sources | default([]))
             + [{'address': backup_store_source_address,
                 'family': ('ipv6' if ':' in (backup_store_source_address | string) else 'ipv4')}] }}
      loop: "{{ groups['postgres'] }}"
      vars:
        backup_store_source_address: >-
          {{ hostvars[item].patroni_advertise_address
             | default(hostvars[item].ansible_host
             | default(hostvars[item].ansible_facts.default_ipv4.address)) }}

    - name: Open SSH to postgres nodes on the backup store host
      ansible.posix.firewalld:
        rich_rule: >-
          rule family="{{ item.family }}" source address="{{ item.address }}"
          port port="{{ backup_store_ssh_port }}" protocol="tcp" accept
        permanent: true
        state: enabled
        immediate: true
        zone: "{{ backup_store_firewalld_zone }}"
      loop: "{{ backup_store_firewall_sources | unique }}"
      when: inventory_hostname not in (groups['monitor'] | default([]))

- name: Create the pgBackRest stanza
  tags: [backup, service]
  block:
    # Run stanza-create on the backup store host. pgBackRest connects to each
    # postgres node over SSH (the pgN-host entries rendered by the
    # server-side config block above)
    # to read pg_control. stanza-create is safe to re-run: pgBackRest returns
    # 0 and prints "stanza already exists" when the stanza is present and
    # consistent. We run as the store user so the store files are owned
    # correctly.

    - name: Create the pgBackRest stanza on the backup store host
      ansible.builtin.command:
        cmd: >-
          pgbackrest --stanza={{ backup_store_stanza }}
          --config={{ backup_store_config_file }}
          stanza-create
      become: true
      become_user: "{{ backup_store_user }}"
      register: backup_store_stanza_create
      changed_when: >-
        'completed successfully' in backup_store_stanza_create.stderr
        or 'completed successfully' in backup_store_stanza_create.stdout
      failed_when: >-
        backup_store_stanza_create.rc != 0
        and 'already exists' not in backup_store_stanza_create.stderr

    - name: Verify the stanza is valid
      ansible.builtin.command:
        cmd: >-
          pgbackrest --stanza={{ backup_store_stanza }}
          --config={{ backup_store_config_file }}
          check
      become: true
      become_user: "{{ backup_store_user }}"
      register: backup_store_stanza_check
      changed_when: false
      failed_when: backup_store_stanza_check.rc != 0

- name: Install scheduled backup timers
  ansible.builtin.import_tasks: _timers.yml
  tags: [backup, service]

---
# The backup_client role ran earlier in this deploy and set the
# `backup_client_ssh_pubkey` fact on every postgres host. Collect those
# public keys and install them into the store user's authorized_keys.

- name: Ensure the store user's .ssh directory exists
  ansible.builtin.file:
    path: "{{ backup_store_user_home }}/.ssh"
    state: directory
    owner: "{{ backup_store_user }}"
    group: "{{ backup_store_group }}"
    mode: "0700"

- name: Authorize each postgres node's pgBackRest public key
  ansible.posix.authorized_key:
    user: "{{ backup_store_user }}"
    key: >-
      command="/usr/bin/pgbackrest server",restrict,from="{{ backup_store_source_address }}"
      {{ hostvars[item].backup_client_ssh_pubkey }}
    state: present
    manage_dir: false
    path: "{{ backup_store_user_home }}/.ssh/authorized_keys"
  loop: "{{ groups['postgres'] }}"
  loop_control:
    label: "{{ item }}"
  when: hostvars[item].backup_client_ssh_pubkey is defined
  vars:
    backup_store_source_address: >-
      {{ hostvars[item].patroni_advertise_address
         | default(hostvars[item].ansible_host
         | default(hostvars[item].ansible_facts.default_ipv4.address)) }}

- name: Fail if any postgres node did not export a public key
  ansible.builtin.assert:
    that:
      - hostvars[item].backup_client_ssh_pubkey is defined
    fail_msg: >-
      {{ item }} did not export backup_client_ssh_pubkey. The
      backup_client role must run before backup_store in site.yml.
  loop: "{{ groups['postgres'] }}"
  loop_control:
    label: "{{ item }}"

- name: Set ownership on authorized_keys
  ansible.builtin.file:
    path: "{{ backup_store_user_home }}/.ssh/authorized_keys"
    owner: "{{ backup_store_user }}"
    group: "{{ backup_store_group }}"
    mode: "0600"

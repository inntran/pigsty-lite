---
- name: Install PGDG repo RPM
  ansible.builtin.dnf:
    name: "{{ repos_pgdg_rpm_url }}"
    state: present
    disable_gpg_check: true
  when: repos_pgdg_enabled | bool

- name: Enable PGDG extras repo
  community.general.ini_file:
    path: "{{ repos_pgdg_repo_file }}"
    section: "{{ repos_pgdg_extras_repo }}"
    option: enabled
    value: "1"
    mode: "0644"
  when: repos_pgdg_enabled | bool

- name: Enable selected PGDG PostgreSQL major repo
  community.general.ini_file:
    path: "{{ repos_pgdg_repo_file }}"
    section: "pgdg{{ repos_pgdg_postgres_version }}"
    option: enabled
    value: "1"
    mode: "0644"
  when: repos_pgdg_enabled | bool

- name: Disable unused PGDG PostgreSQL major repos
  community.general.ini_file:
    path: "{{ repos_pgdg_repo_file }}"
    section: "pgdg{{ item }}"
    option: enabled
    value: "0"
    mode: "0644"
  loop: "{{ repos_pgdg_postgres_repo_versions }}"
  when:
    - repos_pgdg_enabled | bool
    - item | int != repos_pgdg_postgres_version | int

- name: Check PG module disable marker
  ansible.builtin.stat:
    path: /etc/dnf/modules.d/postgresql-disabled
  register: repos_pg_module_marker
  when: repos_pgdg_enabled | bool

- name: Disable default PG module if dnf supports modules
  ansible.builtin.command: dnf -y module disable postgresql
  register: repos_pg_module_disable
  changed_when: >-
    'Disabling' in repos_pg_module_disable.stdout
    or 'Complete!' in repos_pg_module_disable.stdout
  failed_when: false
  when:
    - repos_pgdg_enabled | bool
    - not repos_pg_module_marker.stat.exists

- name: Mark PG module disabled
  ansible.builtin.copy:
    dest: /etc/dnf/modules.d/postgresql-disabled
    content: "disabled by pigsty-lite repos role\n"
    mode: "0644"
  when:
    - repos_pgdg_enabled | bool
    - not repos_pg_module_marker.stat.exists

- name: Ensure dnf priorities plugin package is installed
  ansible.builtin.dnf:
    name: dnf-plugins-core
    state: present

- name: Set priority on PGDG repo sections
  community.general.ini_file:
    path: "{{ repos_pgdg_repo_file }}"
    section: "{{ item }}"
    option: priority
    value: "{{ repos_pgdg_priority | string }}"
    mode: "0644"
    no_extra_spaces: true
  loop:
    - "pgdg-common"
    - "{{ repos_pgdg_extras_repo }}"
    - "pgdg{{ repos_pgdg_postgres_version }}"
  when: repos_pgdg_enabled | bool

- name: Enable CodeReady Builder (CRB) repository
  when: repos_epel_enabled | bool
  block:
    - name: Enable CRB via subscription-manager (RHEL)
      ansible.builtin.command:
        cmd: >-
          subscription-manager repos --enable
          codeready-builder-for-rhel-{{ ansible_facts['distribution_major_version'] }}-{{ ansible_facts['architecture'] }}-rpms
      when: ansible_facts['distribution'] == 'RedHat'
      changed_when: false

    - name: Enable CRB via dnf config-manager (CentOS/AlmaLinux/Rocky)
      ansible.builtin.command:
        cmd: dnf config-manager --set-enabled crb
      when: ansible_facts['distribution'] in ['CentOS', 'AlmaLinux', 'Rocky']
      changed_when: false

    - name: Enable CRB via dnf config-manager (OracleLinux)
      ansible.builtin.command:
        cmd: >-
          dnf config-manager --set-enabled
          ol{{ ansible_facts['distribution_major_version'] }}_codeready_builder
      when: ansible_facts['distribution'] == 'OracleLinux'
      changed_when: false

- name: Install Fedora EPEL repo package
  ansible.builtin.dnf:
    name: "https://dl.fedoraproject.org/pub/epel/epel-release-latest-{{ ansible_facts['distribution_major_version'] }}.noarch.rpm"
    state: present
    disable_gpg_check: true
  when: repos_epel_enabled | bool

- name: Disable EPEL for normal dependency resolution
  community.general.ini_file:
    path: "{{ repos_epel_repo_file }}"
    section: "{{ repos_epel_repo_id }}"
    option: enabled
    value: "0"
    mode: "0644"
  when: repos_epel_enabled | bool

- name: Render /etc/yum.repos.d/pigsty.repo
  ansible.builtin.template:
    src: pigsty.repo.j2
    dest: /etc/yum.repos.d/pigsty.repo
    mode: "0644"
  when: repos_pigsty_enabled | bool

- name: Remove pigsty.repo if disabled
  ansible.builtin.file:
    path: /etc/yum.repos.d/pigsty.repo
    state: absent
  when: not (repos_pigsty_enabled | bool)

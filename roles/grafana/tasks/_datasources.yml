---
# Datasources are provisioned via Grafana's native provisioning YAML so the
# desired state lives in /etc/grafana/provisioning/datasources/ and Grafana
# reconciles on startup. This avoids the REST API (and the
# community.grafana.grafana_datasource ds_type enum, which does not allow
# plugin-provided types like victoriametrics-metrics-datasource).
#
# Plugin upstream docs:
#   https://github.com/VictoriaMetrics/victoriametrics-datasource
#   https://github.com/VictoriaMetrics/victorialogs-datasource

- name: Install the VictoriaMetrics Grafana datasource plugin
  ansible.builtin.command:
    cmd: grafana-cli plugins install victoriametrics-metrics-datasource
  register: grafana_vm_plugin
  changed_when: "'Installed' in grafana_vm_plugin.stdout"
  failed_when:
    - grafana_vm_plugin.rc != 0
    - "'already installed' not in grafana_vm_plugin.stdout"
  notify: Restart grafana

- name: Install the VictoriaLogs Grafana datasource plugin
  ansible.builtin.command:
    cmd: grafana-cli plugins install victoriametrics-logs-datasource
  register: grafana_vl_plugin
  changed_when: "'Installed' in grafana_vl_plugin.stdout"
  failed_when:
    - grafana_vl_plugin.rc != 0
    - "'already installed' not in grafana_vl_plugin.stdout"
  notify: Restart grafana

- name: Render datasource provisioning file
  ansible.builtin.template:
    src: datasources.yaml.j2
    dest: "{{ grafana_provisioning_dir }}/datasources/pigsty-lite-victoriametrics.yaml"
    owner: root
    group: grafana
    mode: "0640"
  notify: Restart grafana

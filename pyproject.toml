[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [".venv", ".uv-cache", "collections", ".ansible"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "B", "UP", "SIM"]
ignore = []

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --strict-markers"

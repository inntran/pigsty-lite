---
# Three plays. Order matters:
#   1. Client install on every postgres node — puts the pgbackrest binary,
#      cert config, and TLS server daemon in place so the server-side
#      stanza-create (which delegates to a postgres node) can run.
#   2. Server install on backup_server — owns the repo, runs the daemon,
#      delegates `pgbackrest stanza-create` to the first postgres node.
#   3. Activate WAL archiving on the postgres group — by PATCHing
#      archive_mode + archive_command into Patroni's DCS dynamic config
#      via its REST API. We never touch patroni's static files; Patroni
#      owns its own config rendering. The final `pgbackrest check` runs
#      here too, since it requires archive_command to be live.
- name: PgBackRest — client install (postgres group)
  hosts: postgres
  become: true
  vars:
    pgbackrest_mode: client
  roles:
    - role: pgbackrest
      tags: [pgbackrest, backup]

- name: PgBackRest — server install + stanza (backup_server group)
  hosts: backup_server
  become: true
  vars:
    pgbackrest_mode: server
  roles:
    - role: pgbackrest
      tags: [pgbackrest, backup]

- name: PgBackRest — activate WAL archiving + optional initial backup (postgres group)
  hosts: postgres
  become: true
  tasks:
    - name: Load pgbackrest role defaults
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../roles/pgbackrest/defaults/main.yml"

    - name: Run archive activation
      ansible.builtin.include_role:
        name: pgbackrest
        tasks_from: _archive.yml
      tags: [pgbackrest, backup, archive]

    - name: Take initial full backup (if enabled)
      ansible.builtin.include_role:
        name: pgbackrest
        tasks_from: _initial_backup.yml
      when: pgbackrest_initial_backup | default(false) | bool
      tags: [pgbackrest, backup, initial-backup]

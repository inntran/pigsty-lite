---
- name: Verify
  hosts: all
  tasks:
    - name: Confirm preflight_passed local fact exists
      ansible.builtin.command: grep -q "preflight_passed=true" /etc/ansible/facts.d/preflight.fact
      changed_when: false

    - name: Gather package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Confirm firewalld is installed
      ansible.builtin.assert:
        that:
          - "'firewalld' in ansible_facts.packages"

    - name: Confirm policycoreutils is installed
      ansible.builtin.assert:
        that:
          - "'policycoreutils' in ansible_facts.packages"

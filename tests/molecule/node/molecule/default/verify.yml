---
- name: Verify
  hosts: all
  ignore_errors: "{{ lookup('ansible.builtin.env', 'MOLECULE_TASK_IGNORE_ERRORS') | default('', true) | bool }}"
  tasks:
    - name: Check firewalld is enabled and running
      ansible.builtin.systemd:
        name: firewalld
        state: started
        enabled: true
      check_mode: true
      register: fw

    - name: Assert firewalld state
      ansible.builtin.assert:
        that:
          - not fw.changed

    - name: Check ssh service is allowed in default zone
      ansible.builtin.command: firewall-cmd --list-services
      register: services
      changed_when: false

    - name: Assert ssh service allowed
      ansible.builtin.assert:
        that:
          - "'ssh' in services.stdout"

    - name: /etc/hosts has pigsty-lite marker
      ansible.builtin.command: grep -q "MANAGED BY pigsty-lite" /etc/hosts
      changed_when: false

    - name: Check sysctl values rendered
      ansible.builtin.command: grep -q "vm.swappiness = 10" /etc/sysctl.d/90-pigsty-lite.conf
      changed_when: false

---
driver:
  name: podman
platforms:
  - name: pigsty-lite-node-rocky10
    image: localhost/molecule-base-common:latest
    pre_build_image: true
    privileged: true
    command: /usr/sbin/init
    volume_mounts:
      - "/sys/fs/cgroup:/sys/fs/cgroup:rw"
    capabilities: [SYS_ADMIN, NET_ADMIN]
    security_opts: ["label=disable"]
    systemd: always
    network: pigsty-lite-node-default
provisioner:
  name: ansible
  inventory:
    group_vars:
      all:
        firewalld_default_zone: public
        node_set_hostname: false
        node_sysctl_apply: false
verifier:
  name: ansible
scenario:
  test_sequence:
    - destroy
    - create
    - converge
    - idempotence
    - verify
    - destroy

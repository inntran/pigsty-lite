---
- name: Verify the role was a no-op
  hosts: postgres
  ignore_errors: "{{ lookup('ansible.builtin.env', 'MOLECULE_TASK_IGNORE_ERRORS') | default('', true) | bool }}"
  become: true
  tasks:
    - name: Gather package facts
      ansible.builtin.package_facts:
        manager: rpm

    - name: Check vip-manager package NOT installed
      ansible.builtin.assert:
        that:
          - "'vip-manager' not in ansible_facts.packages"
        fail_msg: >-
          vip-manager rpm is installed despite vip_manager_enabled=false.
          The disabled short-circuit in tasks/main.yml is broken.

    - name: Check vip-manager.yml NOT rendered
      ansible.builtin.stat:
        path: /etc/vip-manager.yml
      register: vipmgr_cfg

    - name: Assert config absent
      ansible.builtin.assert:
        that:
          - not vipmgr_cfg.stat.exists

    - name: Check vip-manager.service NOT running
      ansible.builtin.systemd:
        name: vip-manager
      register: vipmgr_unit
      failed_when: false

    - name: Assert service inactive
      ansible.builtin.assert:
        that:
          - vipmgr_unit.status.ActiveState != "active"

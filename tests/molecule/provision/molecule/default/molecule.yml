---
driver:
  name: podman
platforms:
  - name: pigsty-lite-provision-default-1
    image: docker.io/rockylinux/rockylinux:10-ubi-init
    pre_build_image: true
    privileged: true
    command: /usr/sbin/init
    volume_mounts:
      - "/sys/fs/cgroup:/sys/fs/cgroup:rw"
    capabilities: [SYS_ADMIN]
    systemd: always
    groups: [etcd, postgres]
provisioner:
  name: ansible
  config_options:
    defaults:
      roles_path: "../../../roles"
      collections_path: "../../../collections"
  inventory:
    group_vars:
      all:
        cluster_name: pigsty-lite-test
        cluster_domain: test.local
        pki_dir: /etc/pki/pigsty-lite
        postgres_version: 18
        postgres_port: 5432
        certs_subject_alternative_names:
          - "DNS:{{ inventory_hostname }}"
          - "DNS:{{ inventory_hostname }}.test.local"
          - "IP:127.0.0.1"
        postgres_users:
          - name: app
            password: "app-test-pw"
            roles: [pg_read_all_data]
        postgres_databases:
          - name: app
            owner: app
        postgres_extensions:
          - pg_stat_statements
          - { name: pgvector, db: app }
        postgres_hba_rules:
          - { db: app, user: app, source: 127.0.0.1/32, method: scram-sha-256 }
      etcd:
        etcd_advertise_address: 127.0.0.1
        etcd_initial_cluster_state: new
      postgres:
        patroni_advertise_address: 127.0.0.1
        patroni_superuser_password: superuser-test-pw
        patroni_replication_password: replicator-test-pw
        patroni_rewind_password: rewind-test-pw
        postgres_tune_profile: tiny
    host_vars:
      pigsty-lite-provision-default-1:
        ansible_host: 127.0.0.1
        postgres_role: primary
        etcd_seq: 1
verifier:
  name: ansible
scenario:
  test_sequence:
    - destroy
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy

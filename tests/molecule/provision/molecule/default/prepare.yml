---
- name: Prepare - generate CA on control side
  hosts: localhost
  gather_facts: false
  vars:
    ca_dir: "{{ playbook_dir }}/_tmp_ca"
  roles:
    - role: ../../../../../roles/ca

- name: Prepare - install sudo for become
  hosts: all
  gather_facts: false
  tasks:
    - name: Install sudo and iproute
      ansible.builtin.dnf:
        name: [sudo, iproute]
        state: present

    - name: Disable PAM for sudo (broken in ubi-init containers)
      ansible.builtin.copy:
        dest: /etc/sudoers.d/nopam
        content: "Defaults !pam_session\n"
        mode: "0440"

- name: Prepare - repos, node, certs, etcd, postgres, patroni
  hosts: all
  gather_facts: true
  become: true
  vars:
    certs_ca_dir_on_control: "{{ playbook_dir }}/_tmp_ca"
    repos_pgdg_enabled: true
    repos_epel_enabled: true
    repos_pgdg_rpm_url: "https://download.postgresql.org/pub/repos/yum/reporpms/EL-10-x86_64/pgdg-redhat-repo-latest.noarch.rpm"
    network_any_address: 0.0.0.0
    network_loopback_address: 127.0.0.1
    firewalld_default_zone: public
    node_sysctl_apply: false
  pre_tasks:
    - name: Pin advertise addresses and SANs to container IP
      ansible.builtin.set_fact:
        etcd_advertise_address: "{{ ansible_facts['default_ipv4']['address'] }}"
        patroni_advertise_address: "{{ ansible_facts['default_ipv4']['address'] }}"
        certs_subject_alternative_names:
          - "DNS:{{ inventory_hostname }}"
          - "DNS:{{ inventory_hostname }}.test.local"
          - "IP:{{ ansible_facts['default_ipv4']['address'] }}"
  roles:
    - role: ../../../../../roles/repos
    - role: ../../../../../roles/node
    - role: ../../../../../roles/certs
    - role: ../../../../../roles/etcd
    - role: ../../../../../roles/postgres
    - role: ../../../../../roles/patroni

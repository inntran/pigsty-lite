---
driver:
  name: podman
platforms:
  - name: pigsty-lite-provision-ha-1
    image: localhost/molecule-base-data:latest
    pre_build_image: true
    privileged: true
    command: /usr/sbin/init
    volume_mounts:
      - "/sys/fs/cgroup:/sys/fs/cgroup:rw"
    capabilities: [SYS_ADMIN]
    security_opts: ["label=disable"]
    systemd: always
    groups: [etcd, postgres]
    network: pigsty-lite-provision-ha
  - name: pigsty-lite-provision-ha-2
    image: localhost/molecule-base-data:latest
    pre_build_image: true
    privileged: true
    command: /usr/sbin/init
    volume_mounts:
      - "/sys/fs/cgroup:/sys/fs/cgroup:rw"
    capabilities: [SYS_ADMIN]
    security_opts: ["label=disable"]
    systemd: always
    groups: [etcd, postgres]
    network: pigsty-lite-provision-ha
  - name: pigsty-lite-provision-ha-3
    image: localhost/molecule-base-data:latest
    pre_build_image: true
    privileged: true
    command: /usr/sbin/init
    volume_mounts:
      - "/sys/fs/cgroup:/sys/fs/cgroup:rw"
    capabilities: [SYS_ADMIN]
    security_opts: ["label=disable"]
    systemd: always
    groups: [etcd, postgres]
    network: pigsty-lite-provision-ha
provisioner:
  name: ansible
  inventory:
    group_vars:
      all:
        cluster_name: pigsty-lite-test
        cluster_domain: test.local
        pigsty_pki_dir: /etc/pki/pigsty
        postgres_version: 18
        postgres_port: 5432
        certs_subject_alternative_names:
          - "DNS:{{ inventory_hostname }}"
          - "DNS:{{ inventory_hostname }}.test.local"
          - "DNS:localhost"
          - "IP:{{ ansible_facts['default_ipv4']['address'] | default('127.0.0.1') }}"
          - "IP:127.0.0.1"
        postgres_users:
          - name: app
            password: "app-test-pw"
            roles: [pg_read_all_data]
        postgres_databases:
          - name: app
            owner: app
        postgres_extensions:
          - pg_stat_statements
        postgres_hba_rules:
          - { db: app, user: app, source: 0.0.0.0/0, method: scram-sha-256 }
      etcd:
        etcd_initial_cluster_state: new
      postgres:
        patroni_superuser_password: superuser-test-pw
        patroni_replication_password: replicator-test-pw
        patroni_rewind_password: rewind-test-pw
        postgres_tune_profile: tiny
    host_vars:
      pigsty-lite-provision-ha-1:
        postgres_role: primary
        etcd_seq: 1
      pigsty-lite-provision-ha-2:
        postgres_role: replica
        etcd_seq: 2
      pigsty-lite-provision-ha-3:
        postgres_role: replica
        etcd_seq: 3
verifier:
  name: ansible
scenario:
  test_sequence:
    - destroy
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy

---
- name: Prepare - generate CA on control side
  hosts: localhost
  gather_facts: false
  vars:
    ca_dir: "{{ playbook_dir }}/_tmp_ca"
  roles:
    - role: ../../../../../roles/ca

- name: Prepare - install sudo for become
  hosts: all
  gather_facts: false
  tasks:
    - name: Install sudo
      ansible.builtin.package:
        name: sudo
        state: present

- name: Prepare - repos, node, certs, etcd, postgres, patroni
  hosts: all
  gather_facts: true
  become: true
  vars:
    certs_ca_dir_on_control: "{{ playbook_dir }}/_tmp_ca"
    repos_pgdg_enabled: true
    repos_epel_enabled: true
    repos_pgdg_rpm_url: "https://download.postgresql.org/pub/repos/yum/reporpms/EL-10-x86_64/pgdg-redhat-repo-latest.noarch.rpm"
    network_any_address: 0.0.0.0
    network_loopback_address: 127.0.0.1
    firewalld_default_zone: public
    node_sysctl_apply: false
  pre_tasks:
    - name: Read container IPv4 address
      ansible.builtin.command: /usr/sbin/ip -4 -o addr show scope global
      register: provision_container_ips
      changed_when: false

    - name: Set molecule network addresses
      ansible.builtin.set_fact:
        provision_container_ip: "{{ provision_container_ips.stdout | regex_search('inet ([0-9.]+)', '\\1') | first }}"

    - name: Set molecule advertise addresses and SANs
      ansible.builtin.set_fact:
        etcd_advertise_address: "{{ provision_container_ip }}"
        patroni_advertise_address: "{{ provision_container_ip }}"
        certs_subject_alternative_names:
          - "DNS:{{ inventory_hostname }}"
          - "DNS:{{ inventory_hostname }}.test.local"
          - "IP:{{ provision_container_ip }}"
  roles:
    - role: ../../../../../roles/repos
    - role: ../../../../../roles/node
    - role: ../../../../../roles/certs
    - role: ../../../../../roles/etcd
    - role: ../../../../../roles/postgres
    - role: ../../../../../roles/patroni

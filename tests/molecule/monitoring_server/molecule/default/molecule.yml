---
driver:
  name: podman
platforms:
  - name: pigsty-lite-monsrv-default-1
    image: localhost/molecule-base-infra:latest
    pre_build_image: true
    privileged: true
    command: /usr/sbin/init
    volume_mounts:
      - "/sys/fs/cgroup:/sys/fs/cgroup:rw"
    capabilities: [SYS_ADMIN]
    security_opts: ["label=disable"]
    systemd: always
    groups: [monitor]
    network: pigsty-lite-monsrv-default
provisioner:
  name: ansible
  inventory:
    group_vars:
      all:
        cluster_name: pigsty-lite-test
        cluster_domain: test.local
        pigsty_pki_dir: /etc/pki/pigsty
        node_sysctl_apply: false
        vmsingle_retention: 7d
        vlsingle_retention: 7d
        alertmanager_receivers: []
    host_vars:
      pigsty-lite-monsrv-default-1: {}
verifier:
  name: ansible
scenario:
  test_sequence:
    - destroy
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy

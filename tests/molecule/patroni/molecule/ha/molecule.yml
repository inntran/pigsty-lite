---
driver:
  name: podman
platforms:
  - name: pigsty-lite-patroni-ha-1
    image: localhost/molecule-base:latest
    pre_build_image: true
    privileged: true
    command: /usr/sbin/init
    volume_mounts:
      - "/sys/fs/cgroup:/sys/fs/cgroup:rw"
    capabilities: [SYS_ADMIN]
    security_opts: ["label=disable"]
    systemd: always
    groups: [etcd, postgres]
    network: pigsty-lite-patroni-ha
  - name: pigsty-lite-patroni-ha-2
    image: localhost/molecule-base:latest
    pre_build_image: true
    privileged: true
    command: /usr/sbin/init
    volume_mounts:
      - "/sys/fs/cgroup:/sys/fs/cgroup:rw"
    capabilities: [SYS_ADMIN]
    security_opts: ["label=disable"]
    systemd: always
    groups: [etcd, postgres]
    network: pigsty-lite-patroni-ha
  - name: pigsty-lite-patroni-ha-3
    image: localhost/molecule-base:latest
    pre_build_image: true
    privileged: true
    command: /usr/sbin/init
    volume_mounts:
      - "/sys/fs/cgroup:/sys/fs/cgroup:rw"
    capabilities: [SYS_ADMIN]
    security_opts: ["label=disable"]
    systemd: always
    groups: [etcd, postgres]
    network: pigsty-lite-patroni-ha
provisioner:
  name: ansible
  inventory:
    group_vars:
      all:
        cluster_name: pigsty-lite-test
        cluster_domain: test.local
        pigsty_pki_dir: /etc/pki/pigsty
        postgres_version: 18
        postgres_port: 5432
      etcd:
        etcd_initial_cluster_state: new
      postgres:
        patroni_superuser_password: superuser-test-pw
        patroni_replication_password: replicator-test-pw
        patroni_rewind_password: rewind-test-pw
        postgres_tune_profile: tiny
    host_vars:
      pigsty-lite-patroni-ha-1:
        postgres_role: primary
        etcd_seq: 1
      pigsty-lite-patroni-ha-2:
        postgres_role: replica
        etcd_seq: 2
      pigsty-lite-patroni-ha-3:
        postgres_role: replica
        etcd_seq: 3
verifier:
  name: ansible
scenario:
  test_sequence:
    - destroy
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy

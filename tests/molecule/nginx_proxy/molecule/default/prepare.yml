---
- name: Prepare - generate CA on control side
  hosts: localhost
  gather_facts: false
  roles:
    - role: ca

- name: Prepare the monitor host stack for nginx proxy testing
  hosts: monitor
  become: true
  gather_facts: true
  vars_files:
    - ../../../../../roles/monitoring_server/defaults/main.yml
  roles:
    - role: preflight
    - role: repos
    - role: node
    - role: certs
    - role: monitoring_server
    - role: grafana

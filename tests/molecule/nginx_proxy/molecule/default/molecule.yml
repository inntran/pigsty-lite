---
driver:
  name: podman
platforms:
  - name: pigsty-lite-nginx-default-1
    image: docker.io/oraclelinux:10
    pre_build_image: true
    privileged: true
    command: /usr/sbin/init
    volume_mounts:
      - "/sys/fs/cgroup:/sys/fs/cgroup:rw"
    capabilities: [SYS_ADMIN]
    security_opts: ["label=disable"]
    systemd: always
    groups: [monitor]
provisioner:
  name: ansible
  config_options:
    defaults:
      collections_path: "../../../collections"
  inventory:
    group_vars:
      all:
        cluster_name: pigsty-lite-test
        cluster_domain: test.local
        pigsty_pigsty_pki_dir: /etc/pki/pigsty
        nginx_proxy_tls_mode: ca_signed
        vmsingle_retention: 7d
        vlsingle_retention: 7d
        alertmanager_receivers: []
    host_vars:
      pigsty-lite-nginx-default-1: {}
verifier:
  name: ansible
scenario:
  test_sequence:
    - destroy
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy

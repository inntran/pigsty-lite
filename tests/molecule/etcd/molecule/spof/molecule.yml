---
driver:
  name: podman
platforms:
  - name: pigsty-lite-etcd-spof
    image: localhost/molecule-base-data:latest
    pre_build_image: true
    privileged: true
    command: /usr/sbin/init
    volume_mounts:
      - "/sys/fs/cgroup:/sys/fs/cgroup:rw"
    capabilities: [SYS_ADMIN]
    security_opts: ["label=disable"]
    systemd: always
    groups: [etcd]
    network: pigsty-lite-etcd-spof
provisioner:
  name: ansible
  inventory:
    group_vars:
      all:
        cluster_name: pigsty-lite-test
        cluster_domain: test.local
        pigsty_pki_dir: /etc/pki/pigsty
      etcd:
        etcd_initial_cluster_state: new
verifier:
  name: ansible
scenario:
  test_sequence:
    - destroy
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy

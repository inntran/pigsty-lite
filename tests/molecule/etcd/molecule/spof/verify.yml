---
- name: Verify
  hosts: all
  gather_facts: true
  pre_tasks:
    - name: Pin advertise address to container IP
      ansible.builtin.set_fact:
        etcd_advertise_address: "{{ ansible_facts['default_ipv4']['address'] }}"
  tasks:
    - name: Etcd service is active
      ansible.builtin.systemd:
        name: etcd
      register: etcd_unit

    - name: Assert etcd active
      ansible.builtin.assert:
        that:
          - etcd_unit.status.ActiveState == "active"

    - name: Etcd endpoint health
      ansible.builtin.command:
        cmd: >-
          etcdctl
          --endpoints=https://{{ etcd_advertise_url_host | default(etcd_advertise_address) }}:2379
          --cacert=/etc/pki/pigsty/ca.crt
          --cert=/etc/pki/pigsty/{{ inventory_hostname }}.crt
          --key=/etc/pki/pigsty/{{ inventory_hostname }}.key
          endpoint health
      register: etcd_health
      changed_when: false

    - name: Assert healthy
      ansible.builtin.assert:
        that:
          - "'is healthy' in etcd_health.stdout"

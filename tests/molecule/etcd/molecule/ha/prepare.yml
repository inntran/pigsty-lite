---
- name: Install fact-gathering tooling missing from the minimal init image
  hosts: all
  gather_facts: false
  tasks:
    - name: Ensure iproute and sudo are present
      ansible.builtin.raw: dnf -y install iproute sudo
      changed_when: false

- name: Prepare - generate CA on control side
  hosts: localhost
  gather_facts: false
  vars:
    ca_dir: "{{ playbook_dir }}/_tmp_ca"
  roles:
    - role: ../../../../../roles/ca

- name: Prepare - repos, node baseline, and host certs on every target
  hosts: all
  gather_facts: true
  vars:
    certs_ca_dir_on_control: "{{ playbook_dir }}/_tmp_ca"
    repos_pgdg_enabled: true
    repos_pgdg_rpm_url: "https://download.postgresql.org/pub/repos/yum/reporpms/EL-10-x86_64/pgdg-redhat-repo-latest.noarch.rpm"
    node_sysctl_apply: false
    certs_subject_alternative_names:
      - "DNS:{{ inventory_hostname }}"
      - "DNS:{{ inventory_hostname }}.test.local"
      - "IP:{{ ansible_default_ipv4.address }}"
  roles:
    - role: ../../../../../roles/repos
    - role: ../../../../../roles/node
    - role: ../../../../../roles/certs

---
driver:
  name: default
platforms:
  - name: localhost
    groups: [localhost]
provisioner:
  name: ansible
  config_options:
    defaults:
      inventory: ./inventory.yml
      collections_path: "../../../collections"
  inventory:
    host_vars:
      localhost:
        ansible_connection: local
        ansible_python_interpreter: "{{ ansible_playbook_python }}"
verifier:
  name: ansible
scenario:
  test_sequence:
    - converge
    - idempotence
    - verify

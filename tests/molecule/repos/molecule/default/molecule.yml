---
driver:
  name: podman
platforms:
  - name: pigsty-lite-repos-rocky10
    image: localhost/molecule-base:latest
    pre_build_image: true
    privileged: true
    command: /usr/sbin/init
    volume_mounts:
      - "/sys/fs/cgroup:/sys/fs/cgroup:rw"
    capabilities: [SYS_ADMIN]
    systemd: always
provisioner:
  name: ansible
  config_options:
    defaults:
      collections_path: "../../../collections"
verifier:
  name: ansible
scenario:
  test_sequence:
    - destroy
    - create
    - converge
    - idempotence
    - verify
    - destroy

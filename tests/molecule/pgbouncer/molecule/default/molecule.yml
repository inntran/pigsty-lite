---
driver:
  name: podman
platforms:
  - name: pigsty-lite-pgbouncer
    image: localhost/molecule-base:latest
    pre_build_image: true
    privileged: true
    command: /usr/sbin/init
    volume_mounts:
      - "/sys/fs/cgroup:/sys/fs/cgroup:rw"
    capabilities: [SYS_ADMIN]
    systemd: always
    groups: [etcd, postgres]
provisioner:
  name: ansible
  config_options:
    defaults:
      collections_path: "../../../collections"
  inventory:
    group_vars:
      all:
        cluster_name: pigsty-lite-test
        cluster_domain: test.local
        pki_dir: /etc/pki/pigsty-lite
        postgres_version: 18
        postgres_port: 5432
      etcd:
        etcd_initial_cluster_state: new
      postgres:
        patroni_superuser_password: superuser-test-pw
        patroni_replication_password: replicator-test-pw
        patroni_rewind_password: rewind-test-pw
        postgres_tune_profile: tiny
    host_vars:
      pigsty-lite-pgbouncer:
        postgres_role: primary
        etcd_seq: 1
verifier:
  name: ansible
scenario:
  test_sequence:
    - destroy
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy

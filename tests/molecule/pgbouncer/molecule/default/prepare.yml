---
- name: Install bootstrap tooling
  hosts: all
  gather_facts: false
  tasks:
    - name: Ensure iproute is present
      ansible.builtin.dnf:
        name: iproute
        state: present

- name: Prepare - generate CA on control side
  hosts: localhost
  gather_facts: false
  roles:
    - role: ca

- name: Prepare - repos, certs, etcd, postgres, patroni
  hosts: all
  gather_facts: true
  vars:
    repos_pgdg_enabled: true
    repos_pgdg_rpm_url: "https://download.postgresql.org/pub/repos/yum/reporpms/EL-10-x86_64/pgdg-redhat-repo-latest.noarch.rpm"
    network_any_address: 0.0.0.0
    network_loopback_address: 127.0.0.1
    firewalld_default_zone: public
  pre_tasks:
    - name: Pin advertise address to container IP
      ansible.builtin.set_fact:
        etcd_advertise_address: "{{ ansible_facts['default_ipv4']['address'] }}"
        patroni_advertise_address: "{{ ansible_facts['default_ipv4']['address'] }}"
  roles:
    - role: repos
    - role: certs
    - role: etcd
    - role: postgres
    - role: patroni

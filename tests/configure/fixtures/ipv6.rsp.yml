---
profile: single
network:
  ip_version: ipv6
cluster:
  name: pg-dev-v6
  domain: example.internal
nodes:
  pgmon01:
    ip: 2001:db8:10::10
    role: monitor
  pgnode01:
    ip: 2001:db8:10::11
    role: pg_primary
postgres:
  version: 18
  port: 5432
  tune: oltp
  shared_buffer_ratio: 0.25
  extensions: [pg_stat_statements]
  databases: []
  users: []
  hba_rules:
    - {db: app, user: app, source: 2001:db8:40::/64, method: scram-sha-256}
pgbackrest:
  enabled: false
tls:
  internal_ca: generate
  user_facing: {mode: ca_signed}
monitoring:
  vmsingle_retention: 30d
  vlsingle_retention: 14d
  alertmanager: {receivers: []}
repos:
  pigsty: {enabled: false, packages: []}
firewall:
  operator_cidrs: ["2001:db8::/32"]
  postgres_client_cidrs: ["2001:db8:40::/64"]

---
# Cross-role coordination for pigsty-lite. Generated examples in
# inventory/examples/ illustrate identity-only host vars; this file
# defines the shared defaults all roles depend on.
#
# Variable precedence (low -> high):
#   role defaults -> group_vars/all -> group_vars/<group> ->
#   inventory host vars -> group_vars/response.yml -> --extra-vars

# Identity ----------------------------------------------------------
cluster_profile: "ha"
cluster_name: "pg-pigsty-lite"
cluster_domain: "example.internal"
network_ip_version: "dual"
network_ipv6_single_stack: false
network_loopback_address: "127.0.0.1"
network_loopback_addresses: ["127.0.0.1", "::1"]
network_any_address: "0.0.0.0"

# OS / SELinux / firewalld -----------------------------------------
selinux_required_mode: "Enforcing"
firewalld_default_zone: "public"

# Paths (vendor defaults; do not change without strong reason) ------
postgres_data_dir_pattern: "/var/lib/pgsql/{{ postgres_version }}/data"
etcd_data_dir: "/var/lib/etcd"
backup_store_path: "/var/lib/pgbackrest"
pki_dir: "/etc/pki/pigsty-lite"

# Ports -------------------------------------------------------------
postgres_port: 5432
pgbouncer_port: 6432
haproxy_default_port: 5432
haproxy_primary_port: 5433
haproxy_replica_port: 5434
haproxy_stats_port: 7000
haproxy_loopback_listen_addresses: ["127.0.0.2"]
patroni_rest_port: 8008
etcd_client_port: 2379
etcd_peer_port: 2380
vmsingle_port: 8428
vlsingle_port: 9428
vmalert_port: 8880
alertmanager_port: 9093
grafana_port: 3000
node_exporter_port: 9100
postgres_exporter_port: 9187
pgbouncer_exporter_port: 9127
pgbackrest_exporter_port: 9854
vmagent_port: 8429
vlagent_port: 9429

# Versions ----------------------------------------------------------
postgres_version: 18

# Repo policy -------------------------------------------------------
repos_pgdg_enabled: true
repos_vendor_enabled: true
repos_epel_enabled: false
repos_pigsty_enabled: false
repos_pigsty_packages: []

# Cert renewal ------------------------------------------------------
cert_validity_days: 730
cert_renewal_window_days: 30

# Backups -----------------------------------------------------------
# Operator-facing names stay generic so future backup tools can reuse
# the same response-file contract. P4 implements the pgBackRest backend.
backup_tool: pgbackrest
backup_stanza: "{{ cluster_name | default('pigsty-lite') }}"
backup_store_user: pgbackrest
backup_ssh_port: 22

# Monitoring --------------------------------------------------------
# The monitor host is the single member of the `monitor` group. Agents
# remote_write metrics and ship logs to it. Scrape interval is the
# operator-tunable cadence for vmagent.
monitoring_host: "{{ groups['monitor'][0] }}"
monitoring_scrape_interval: 15s

# Lifecycle operations (P6) -----------------------------------------
# Replication lag a replica must be under before a lifecycle operation
# treats it as converged (bytes). 1 MiB per the design spec.
cluster_ops_replication_lag_max_bytes: 1048576
# Minor-upgrade safety gate: refuse to upgrade unless a successful
# backup exists within this many hours. Operator can override via the
# response file's postgres.minor_upgrade block.
postgres_minor_upgrade_require_recent_backup_hours: 24

# Operator network defaults - override in response file -------------
operator_cidrs: ["10.0.0.0/8"]
postgres_client_cidrs: ["10.0.0.0/8"]

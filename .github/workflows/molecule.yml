---
name: molecule
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-image:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.key.outputs.key }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute cache key
        id: key
        run: echo "key=molecule-image-${{ hashFiles('tests/molecule/Containerfile') }}" >> "$GITHUB_OUTPUT"

      - name: Restore cached image
        id: cache
        uses: actions/cache@v5
        with:
          path: /tmp/molecule-base.tar
          key: ${{ steps.key.outputs.key }}

      - name: Build and export image
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          podman build -t molecule-base:latest -f tests/molecule/Containerfile .
          podman save -o /tmp/molecule-base.tar molecule-base:latest

  molecule:
    needs: build-image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - role: preflight
            scenario: default
          - role: repos
            scenario: default
          - role: node
            scenario: default
          - role: ca
            scenario: default
          - role: certs
            scenario: default
          - role: etcd
            scenario: spof
          - role: etcd
            scenario: ha
          - role: postgres
            scenario: default
          - role: patroni
            scenario: spof
          - role: patroni
            scenario: ha
          - role: pgbouncer
            scenario: default
          - role: haproxy
            scenario: default
          - role: haproxy
            scenario: ha
          - role: provision
            scenario: default
          - role: provision
            scenario: ha
          - role: backup
            scenario: default
          - role: backup
            scenario: ha
          - role: cluster_ops
            scenario: default
    steps:
      - uses: actions/checkout@v6

      - name: Restore cached image
        uses: actions/cache@v5
        with:
          path: /tmp/molecule-base.tar
          key: ${{ needs.build-image.outputs.cache-key }}

      - name: Load image into podman
        run: podman load -i /tmp/molecule-base.tar

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install python tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            ansible \
            "molecule==25.*" \
            "molecule-plugins[podman]==25.*" \
            cryptography \
            pytest

      - name: Install Galaxy content
        run: |
          ansible-galaxy collection install -r requirements.yml -p ./collections
          ansible-galaxy role install -r requirements.yml -p ./roles.galaxy

      - name: molecule ${{ matrix.role }} (${{ matrix.scenario }})
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/collections
        run: |
          cd tests/molecule/${{ matrix.role }}
          molecule test -s ${{ matrix.scenario }}

---
name: molecule
on:
  pull_request:
  push:
    branches: [main]

jobs:
  molecule:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - role: preflight
            scenario: default
          - role: repos
            scenario: default
          - role: node
            scenario: default
          - role: ca
            scenario: default
          - role: certs
            scenario: default
          - role: etcd
            scenario: single
          - role: etcd
            scenario: ha
          - role: postgres
            scenario: default
          - role: patroni
            scenario: single
          - role: patroni
            scenario: ha
    steps:
      - uses: actions/checkout@v6

      - name: Install podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install python tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            ansible \
            "molecule==25.*" \
            "molecule-plugins[podman]==25.*" \
            cryptography \
            pytest

      - name: Install Galaxy content
        run: |
          ansible-galaxy collection install -r requirements.yml -p ./collections
          ansible-galaxy role install -r requirements.yml -p ./roles.galaxy

      - name: molecule ${{ matrix.role }} (${{ matrix.scenario }})
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/collections
        run: |
          cd tests/molecule/${{ matrix.role }}
          molecule test -s ${{ matrix.scenario }}

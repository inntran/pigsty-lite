---
name: lint
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils shellcheck

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install python tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install yamllint ansible-lint ruff ansible-core==2.20.* pyyaml pytest

      - name: Install Galaxy content
        run: |
          ansible-galaxy collection install -r requirements.yml -p ./collections
          ansible-galaxy role install -r requirements.yml -p ./roles.galaxy

      - name: Install markdownlint
        run: npm install -g markdownlint-cli2

      - name: yamllint
        run: yamllint .

      - name: ansible-lint
        run: ansible-lint

      - name: ruff check
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

      - name: pytest configure tests
        run: python -m pytest tests/configure -v

      - name: markdownlint
        run: markdownlint-cli2 "**/*.md" "#collections" "#.ansible" "#docs/superpowers"

      - name: xmllint firewalld services
        run: |
          if compgen -G "files/firewalld/services/*.xml" > /dev/null; then
            xmllint --noout files/firewalld/services/*.xml
          fi
